<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Server Manager</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
.app { display: flex; min-height: 100vh; }
.sidebar { width: 240px; background: #0b1324; border-right: 1px solid #1e293b; padding: 16px; display: flex; flex-direction: column; gap: 16px; flex-shrink: 0; }
.sidebar h1 { font-size: 1.1rem; font-weight: 700; color: #f59e0b; display: flex; align-items: center; gap: 8px; }
.sidebar h1 svg { width: 20px; height: 20px; }
.sidebar-select { width: 100%; padding: 8px 10px; border-radius: 8px; border: 1px solid #1e293b; background: #0f172a; color: #e2e8f0; font-size: 0.85rem; }
.server-list { display: flex; flex-direction: column; gap: 4px; flex: 1; overflow-y: auto; }
.server-item { padding: 10px 12px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: background 0.15s; }
.server-item:hover { background: #1e293b; }
.server-item.active { background: #1e293b; border-left: 3px solid #f59e0b; }
.server-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.server-dot.online { background: #22c55e; }
.server-dot.offline { background: #ef4444; }
.server-info { flex: 1; min-width: 0; }
.server-name { font-weight: 600; font-size: 0.88rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.server-meta { font-size: 0.75rem; color: #94a3b8; }
.sidebar-actions { display: flex; gap: 8px; }
.sidebar-actions button { flex: 1; padding: 8px; border-radius: 8px; border: 1px solid #1e293b; background: #0f172a; color: #e2e8f0; cursor: pointer; font-size: 0.8rem; font-weight: 600; transition: all 0.15s; }
.sidebar-actions button:hover { background: #1e293b; border-color: #f59e0b; }

.main { flex: 1; padding: 24px; overflow-y: auto; }
.header { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
.header-left h2 { font-size: 1.5rem; font-weight: 700; }
.header-left .meta { display: flex; gap: 10px; margin-top: 6px; font-size: 0.82rem; color: #94a3b8; flex-wrap: wrap; }
.pill { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 999px; font-size: 0.75rem; font-weight: 600; }
.pill.green { background: rgba(34,197,94,0.15); color: #22c55e; }
.pill.red { background: rgba(239,68,68,0.15); color: #ef4444; }
.pill.blue { background: rgba(59,130,246,0.15); color: #3b82f6; }
.header-actions { display: flex; gap: 8px; flex-wrap: wrap; }
.btn { padding: 8px 16px; border-radius: 8px; border: none; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.15s; display: inline-flex; align-items: center; gap: 6px; }
.btn-primary { background: #22c55e; color: #fff; }
.btn-primary:hover { background: #16a34a; }
.btn-danger { background: #ef4444; color: #fff; }
.btn-danger:hover { background: #dc2626; }
.btn-outline { background: transparent; border: 1px solid #1e293b; color: #e2e8f0; }
.btn-outline:hover { border-color: #f59e0b; }
.btn-sm { padding: 5px 10px; font-size: 0.78rem; }

.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 12px; margin-bottom: 24px; }
.stat-card { background: #0b1324; border: 1px solid #1e293b; border-radius: 12px; padding: 16px; }
.stat-card .stat-label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.08em; color: #64748b; }
.stat-card .stat-value { font-size: 1.4rem; font-weight: 700; margin-top: 4px; }

.panel { background: #0b1324; border: 1px solid #1e293b; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
.panel-title { font-size: 0.82rem; text-transform: uppercase; letter-spacing: 0.06em; color: #94a3b8; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
.log-box { background: #020617; border: 1px solid #1e293b; border-radius: 8px; padding: 12px; font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 0.78rem; line-height: 1.5; color: #a5b4fc; max-height: 300px; overflow-y: auto; white-space: pre-wrap; word-break: break-all; }
.log-box .dim { color: #475569; }

.resource-bar { margin-bottom: 10px; }
.resource-header { display: flex; justify-content: space-between; font-size: 0.82rem; margin-bottom: 4px; }
.resource-track { height: 8px; background: #1e293b; border-radius: 999px; overflow: hidden; }
.resource-fill { height: 100%; border-radius: 999px; transition: width 1s ease; }
.resource-fill.green { background: #22c55e; }
.resource-fill.orange { background: #f59e0b; }

.config-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.config-field { display: flex; flex-direction: column; gap: 4px; }
.config-field label { font-size: 0.78rem; color: #94a3b8; }
.config-field input, .config-field select { padding: 8px 10px; border-radius: 8px; border: 1px solid #1e293b; background: #0f172a; color: #e2e8f0; font-size: 0.85rem; }
.config-field input:focus, .config-field select:focus { outline: none; border-color: #f59e0b; }
.config-field .toggle-row { display: flex; align-items: center; gap: 8px; padding: 6px 0; }
.config-field .toggle-row input[type="checkbox"] { width: 18px; height: 18px; accent-color: #f59e0b; }

.tabs { display: flex; gap: 2px; margin-bottom: 16px; background: #0f172a; border-radius: 8px; padding: 3px; }
.tab { padding: 8px 16px; border-radius: 6px; border: none; background: transparent; color: #94a3b8; cursor: pointer; font-size: 0.82rem; font-weight: 600; transition: all 0.15s; }
.tab.active { background: #1e293b; color: #e2e8f0; }
.tab:hover:not(.active) { color: #e2e8f0; }

.modal-overlay { position: fixed; inset: 0; background: rgba(2,6,23,0.7); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 100; }
.modal { background: #0b1324; border: 1px solid #1e293b; border-radius: 16px; padding: 24px; width: min(480px, 90vw); max-height: 80vh; overflow-y: auto; }
.modal h3 { font-size: 1.1rem; margin-bottom: 16px; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
.modal .field { margin-bottom: 12px; }
.modal .field label { display: block; font-size: 0.78rem; color: #94a3b8; margin-bottom: 4px; }
.modal .field input, .modal .field select { width: 100%; padding: 8px 10px; border-radius: 8px; border: 1px solid #1e293b; background: #0f172a; color: #e2e8f0; font-size: 0.85rem; }
.modal .field input:focus, .modal .field select:focus { outline: none; border-color: #f59e0b; }
.modal .field .hint { font-size: 0.75rem; color: #64748b; margin-top: 2px; }

.empty-state { text-align: center; padding: 60px 20px; color: #64748b; }
.empty-state svg { width: 48px; height: 48px; margin-bottom: 12px; opacity: 0.4; }
.empty-state h3 { font-size: 1.1rem; margin-bottom: 6px; color: #94a3b8; }

@media (max-width: 768px) { .app { flex-direction: column; } .sidebar { width: 100%; max-height: 200px; } .config-grid { grid-template-columns: 1fr; } .header { flex-direction: column; align-items: flex-start; } }
</style>
</head>
<body>
<div class="app" id="app">
  <div class="sidebar">
    <h1><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16v16H4z"/><path d="M9 9h6v6H9z"/><circle cx="19" cy="5" r="1"/></svg>Server Manager</h1>
    <div class="sidebar-actions">
      <button onclick="showCreateModal()">+ New</button>
      <button onclick="loadServers()" title="Refresh">↻</button>
    </div>
    <div class="server-list" id="serverList"></div>
  </div>
  <div class="main" id="mainContent">
    <div class="empty-state" id="emptyState">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="20" height="20" rx="2"/><path d="M6 6h4v4H6zM14 6h4v4h-4zM6 14h4v4H6zM14 14h4v4h-4z"/></svg>
      <h3>No server selected</h3>
      <p>Select a server from the sidebar or create a new one.</p>
    </div>
    <div id="serverView" style="display:none"></div>
  </div>
</div>

<div class="modal-overlay" id="createModal" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h3>Create Server</h3>
    <div class="field"><label>Server Name</label><input id="newName" value="" placeholder="My Server"></div>
    <div class="field"><label>Server Path</label><input id="newPath" value="" placeholder="/home/user/minecraft-server"></div>
    <div class="field"><label>Game</label><select id="newGame"><option value="minecraft">Minecraft</option><option value="cs2">Counter-Strike 2</option><option value="ark">ARK</option><option value="custom">Custom</option></select></div>
    <div id="mcOptions">
      <div class="field"><label>Setup</label><select id="newType"><option value="vanilla">Vanilla</option><option value="paper">Paper</option></select></div>
      <div class="field"><label>Version</label><select id="newVersion"><option>Loading...</option></select></div>
      <div class="field"><label><input type="checkbox" id="newEula" checked> Accept Minecraft EULA</label></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="createServer()">Create</button>
    </div>
  </div>
</div>

<script>
let servers = [];
let selectedId = null;
let refreshInterval = null;
let logsInterval = null;

function $(id) { return document.getElementById(id); }

async function api(method, url, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(url, opts);
  if (!r.ok) { const e = await r.json().catch(()=>({})); throw new Error(e.error || r.statusText); }
  return r.json();
}

async function loadServers() {
  try {
    servers = await api('GET', '/api/servers');
    renderSidebar();
    if (selectedId && servers.find(s => s.id === selectedId)) renderServer(servers.find(s => s.id === selectedId));
    else if (!selectedId && servers.length > 0) { selectedId = servers[0].id; renderServer(servers[0]); }
  } catch(e) { console.error(e); }
}

function renderSidebar() {
  const list = $('serverList');
  if (servers.length === 0) { list.innerHTML = '<div style="color:#475569;font-size:0.82rem;padding:12px;text-align:center">No servers yet</div>'; return; }
  list.innerHTML = servers.map(s => `
    <div class="server-item ${s.id === selectedId ? 'active' : ''}" onclick="selectServer('${s.id}')">
      <div class="server-dot ${s.running ? 'online' : 'offline'}"></div>
      <div class="server-info">
        <div class="server-name">${esc(s.name)}</div>
        <div class="server-meta">${s.running ? 'Online' : 'Offline'} · ${s.gameKind}</div>
      </div>
    </div>
  `).join('');
}

function selectServer(id) {
  selectedId = id;
  const s = servers.find(x => x.id === id);
  if (s) renderServer(s);
  renderSidebar();
}

function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

function renderServer(s) {
  if (!s) return;
  $('emptyState').style.display = 'none';
  $('serverView').style.display = 'block';
  $('serverView').innerHTML = `
    <div class="header">
      <div class="header-left">
        <h2>${esc(s.name)}</h2>
        <div class="meta">
          <span class="pill ${s.running ? 'green' : 'red'}">${s.running ? 'Online' : 'Offline'}</span>
          <span class="pill blue">${esc(s.gameKind)}</span>
          <span>Port: ${s.port}</span>
          <span>${s.running ? 'CPU: '+s.cpu?.toFixed(1)+'%' : ''}</span>
          <span>${s.running ? 'RAM: '+Math.round(s.ramMB)+' MB' : ''}</span>
        </div>
      </div>
      <div class="header-actions">
        ${s.running ? `<button class="btn btn-danger btn-sm" onclick="stopServer('${s.id}')">■ Stop</button>` : `<button class="btn btn-primary btn-sm" onclick="startServer('${s.id}')">▶ Start</button>`}
        <button class="btn btn-outline btn-sm" onclick="showKillModal('${s.id}')">✕ Kill</button>
        <button class="btn btn-outline btn-sm" onclick="showConfigModal('${s.id}')">⚙ Config</button>
        <button class="btn btn-outline btn-sm" onclick="showDeleteModal('${s.id}')">🗑 Delete</button>
      </div>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab(this,'dashboard')">Dashboard</button>
      <button class="tab" onclick="switchTab(this,'console')">Console</button>
      <button class="tab" onclick="switchTab(this,'config')">Config</button>
      <button class="tab" onclick="switchTab(this,'backups')">Backups</button>
    </div>
    <div id="tabContent"></div>
  `;
  renderDashboard(s);
  startPolling(s.id);
}

function switchTab(el, tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  const s = servers.find(x => x.id === selectedId);
  if (!s) return;
  if (tab === 'dashboard') renderDashboard(s);
  else if (tab === 'console') renderConsole(s);
  else if (tab === 'config') renderConfig(s);
  else if (tab === 'backups') renderBackups(s);
}

function startPolling(id) {
  clearInterval(refreshInterval); clearInterval(logsInterval);
  refreshInterval = setInterval(async () => {
    try {
      const s = servers.find(x => x.id === id);
      if (!s) return;
      const stats = await api('GET', `/api/servers/${id}/stats`);
      s.running = stats.running; s.cpu = stats.cpu; s.ramMB = stats.ramMB;
      const activeTab = document.querySelector('.tab.active');
      if (activeTab && activeTab.textContent.trim() === 'Dashboard') renderStats(s);
      renderSidebar();
    } catch(e) {}
  }, 3000);
}

// Dashboard
function renderDashboard(s) {
  $('tabContent').innerHTML = `
    <div class="grid">
      <div class="stat-card"><div class="stat-label">Status</div><div class="stat-value" style="color:${s.running?'#22c55e':'#ef4444'}">${s.running?'Online':'Offline'}</div></div>
      <div class="stat-card"><div class="stat-label">Game</div><div class="stat-value">${esc(s.gameKind)}</div></div>
      <div class="stat-card"><div class="stat-label">CPU</div><div class="stat-value" id="statCpu">${s.running?s.cpu?.toFixed(1)+'%':'0%'}</div></div>
      <div class="stat-card"><div class="stat-label">RAM</div><div class="stat-value" id="statRam">${s.running?Math.round(s.ramMB)+' MB':'0 MB'}</div></div>
      <div class="stat-card"><div class="stat-label">Port</div><div class="stat-value">${s.port}</div></div>
      <div class="stat-card"><div class="stat-label">Players</div><div class="stat-value">${s.maxPlayers||'20'}</div></div>
    </div>
    <div class="panel">
      <div class="panel-title">📊 Resource Usage</div>
      <div class="resource-bar"><div class="resource-header"><span>CPU</span><span id="cpuText">${s.running?s.cpu?.toFixed(1)+'%':'0%'}</span></div><div class="resource-track"><div class="resource-fill green" id="cpuBar" style="width:${Math.min(s.cpu||0,100)}%"></div></div></div>
      <div class="resource-bar"><div class="resource-header"><span>RAM</span><span id="ramText">${s.running?Math.round(s.ramMB)+' MB / '+s.ramGB+' GB':'0 MB'}</span></div><div class="resource-track"><div class="resource-fill orange" id="ramBar" style="width:${Math.min((s.ramMB||0)/((s.ramGB||4)*1024)*100,100)}%"></div></div></div>
    </div>
    <div class="panel">
      <div class="panel-title">🔗 Connection</div>
      <div style="font-size:0.88rem;line-height:1.8">
        <div>Address: <strong>${esc(s.publicJoinAddress||'Not set')}</strong></div>
        <div>Playit: <strong>${esc(s.playitTargetAddress||'Not set')}</strong></div>
        <div>Local: <strong>127.0.0.1:${s.port}</strong></div>
      </div>
    </div>
    <div class="panel">
      <div class="panel-title">⚡ Quick Actions</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-outline btn-sm" onclick="openFolder('${s.id}')">📂 Open Folder</button>
        <button class="btn btn-outline btn-sm" onclick="sendCommand('${s.id}','list')">👥 List Players</button>
        <button class="btn btn-outline btn-sm" onclick="showConfigModal('${s.id}')">⚙ Settings</button>
      </div>
    </div>
  `;
}

function renderStats(s) {
  const cpuEl = $('statCpu'); if(cpuEl) cpuEl.textContent = s.running?s.cpu?.toFixed(1)+'%':'0%';
  const ramEl = $('statRam'); if(ramEl) ramEl.textContent = s.running?Math.round(s.ramMB)+' MB':'0 MB';
  const cpuT = $('cpuText'); if(cpuT) cpuT.textContent = s.running?s.cpu?.toFixed(1)+'%':'0%';
  const ramT = $('ramText'); if(ramT) ramT.textContent = s.running?Math.round(s.ramMB)+' MB / '+s.ramGB+' GB':'0 MB';
  const cpuB = $('cpuBar'); if(cpuB) cpuB.style.width = Math.min(s.cpu||0,100)+'%';
  const ramB = $('ramBar'); if(ramB) ramB.style.width = Math.min((s.ramMB||0)/((s.ramGB||4)*1024)*100,100)+'%';
}

// Console
function renderConsole(s) {
  $('tabContent').innerHTML = `
    <div class="panel">
      <div class="panel-title">💻 Console</div>
      <div class="log-box" id="logBox">${esc(s.logs||'Server output will appear here.')}</div>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:16px">
      <input id="cmdInput" style="flex:1;padding:10px 14px;border-radius:8px;border:1px solid #1e293b;background:#0f172a;color:#e2e8f0;font-size:0.88rem" placeholder="Type a command..." onkeydown="if(event.key==='Enter')sendCmd()">
      <button class="btn btn-primary" onclick="sendCmd()">Send</button>
    </div>
  `;
  clearInterval(logsInterval);
  logsInterval = setInterval(async () => {
    try {
      const data = await api('GET', '/api/servers/${s.id}/logs');
      const box = $('logBox');
      if (box) box.textContent = data.logs || 'No output yet.';
    } catch(e) {}
  }, 2000);
}

async function sendCmd() {
  const input = $('cmdInput');
  if (!input || !input.value.trim()) return;
  try { await api('POST', '/api/servers/${selectedId}/command', { command: input.value }); input.value = ''; } catch(e) { alert(e.message); }
}

// Config
function renderConfig(s) {
  $('tabContent').innerHTML = `
    <div class="panel">
      <div class="panel-title">⚙ Configuration</div>
      <div class="config-grid">
        <div class="config-field"><label>Server Name</label><input value="${esc(s.name)}" onchange="updateServer('${s.id}','name',this.value)"></div>
        <div class="config-field"><label>Server Port</label><input value="${s.port}" onchange="updateServer('${s.id}','port',this.value)"></div>
        <div class="config-field"><label>RAM (GB)</label><input type="number" value="${s.ramGB}" min="1" max="32" onchange="updateServer('${s.id}','ramGB',parseInt(this.value)||4)"></div>
        <div class="config-field"><label>CPU Threads</label><input type="number" value="${s.cpuThreads}" min="1" onchange="updateServer('${s.id}','cpuThreads',parseInt(this.value)||1)"></div>
        <div class="config-field"><label>Max Players</label><input value="${s.maxPlayers}" onchange="updateServer('${s.id}','maxPlayers',this.value)"></div>
        <div class="config-field"><label>Public Address</label><input value="${esc(s.publicJoinAddress||'')}" onchange="updateServer('${s.id}','publicJoinAddress',this.value)"></div>
        <div class="config-field"><label>Playit Address</label><input value="${esc(s.playitTargetAddress||'')}" onchange="updateServer('${s.id}','playitTargetAddress',this.value)"></div>
        <div class="config-field"><label>MOTD</label><input value="${esc(s.motd||'')}" onchange="updateServer('${s.id}','motd',this.value)"></div>
      </div>
    </div>
    <div class="panel">
      <div class="panel-title">🔄 Automation</div>
      <div class="config-grid">
        <div class="config-field"><div class="toggle-row"><input type="checkbox" ${s.autoRestart?'checked':''} onchange="updateServer('${s.id}','autoRestart',this.checked)"><label>Auto-restart on crash</label></div></div>
        <div class="config-field"><div class="toggle-row"><input type="checkbox" ${s.autoScale?'checked':''} onchange="updateServer('${s.id}','autoScale',this.checked)"><label>Auto-scale RAM</label></div></div>
        <div class="config-field"><div class="toggle-row"><input type="checkbox" ${s.backupEnabled?'checked':''} onchange="updateServer('${s.id}','backupEnabled',this.checked)"><label>Auto-backup</label></div></div>
        <div class="config-field"><label>Backup interval (hours)</label><input type="number" value="${s.backupIntervalHours}" min="1" onchange="updateServer('${s.id}','backupIntervalHours',parseFloat(this.value)||6)"></div>
        <div class="config-field"><label>Max backups</label><input type="number" value="${s.maxBackups}" min="1" onchange="updateServer('${s.id}','maxBackups',parseInt(this.value)||10)"></div>
      </div>
    </div>
  `;
}

function renderBackups(s) { $('tabContent').innerHTML = '<div class="panel"><div class="panel-title">💾 Backups</div><p style="color:#94a3b8">Backup system will be initialized when auto-backup is enabled in Config.</p></div>'; }

// Actions
async function startServer(id) {
  try { await api('POST', '/api/servers/'+id+'/start'); loadServers(); } catch(e) { alert(e.message); }
}
async function stopServer(id) {
  try { await api('POST', '/api/servers/'+id+'/stop'); loadServers(); } catch(e) { alert(e.message); }
}
async function updateServer(id, key, val) {
  try { await api('PUT', '/api/servers/'+id, { [key]: val }); loadServers(); } catch(e) { alert(e.message); }
}
async function sendCommand(id, cmd) {
  try { await api('POST', '/api/servers/'+id+'/command', { command: cmd }); } catch(e) { alert(e.message); }
}
function openFolder(id) { /* TODO: open in file manager */ alert('Open file manager to the server folder'); }

// Create Modal
async function showCreateModal() {
  $('createModal').style.display = 'flex';
  $('newName').value = 'Server '+(servers.length+1);
  $('newPath').value = process.env.HOME+'/minecraft-server-'+(servers.length+1);
  $('mcOptions').style.display = 'block';
  const sel = $('newVersion');
  sel.innerHTML = '<option>Loading versions...</option>';
  try {
    const versions = await api('GET', '/api/versions/vanilla');
    sel.innerHTML = versions.map(v => '<option value="'+v.id+'">'+esc(v.id)+'</option>').join('');
  } catch { sel.innerHTML = '<option value="1.21.1">1.21.1</option>'; }
}

function closeModal() { $('createModal').style.display = 'none'; }

async function createServer() {
  const name = $('newName').value.trim();
  const spath = $('newPath').value.trim();
  if (!name || !spath) { alert('Name and path required'); return; }
  try {
    const s = await api('POST', '/api/servers', { name, path: spath, gameKind: $('newGame').value });
    const type = $('newType').value;
    const version = $('newVersion').value;
    if (type && version) {
      const eula = $('newEula').checked;
      let build = null;
      if (type === 'paper') {
        const papers = await api('GET', '/api/versions/paper');
        const found = papers.find(p => p.version === version);
        if (found) build = found.build;
      }
      await api('POST', `/api/servers/${s.id}/install`, { type, version, build, eula });
    }
    closeModal();
    selectedId = s.id;
    loadServers();
  } catch(e) { alert('Error: '+e.message); }
}

// Delete/Kill
function showDeleteModal(id) {
  if (confirm('Delete this server configuration?')) {
    api('DELETE', '/api/servers/'+id).then(() => { selectedId = null; loadServers(); $('serverView').style.display='none'; $('emptyState').style.display='block'; });
  }
}
function showKillModal(id) {
  if (confirm('Force kill the server process?')) {
    api('POST', '/api/servers/'+id+'/kill').then(() => loadServers());
  }
}

// Init
loadServers();
</script>
</body>
</html>
